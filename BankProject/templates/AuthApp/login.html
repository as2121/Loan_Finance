{% extends 'FinanceApp/layout.html'%}
{% load static %}

{% block title %}
<title>Finance-login</title>
{% endblock title %}


{% block content %}
<div style="margin-top:100px;margin-bottom:100px; " class="container">
    <div class="row justify-content-center">
       <div class="col-md-6 p-5 shadow" style="background-color:rgba(255, 255, 255,0.8);border-radius:10px">

    <h3 class="text-center">USER LOGIN</h3>
      <form class="pt-3 " method="post">
          {% csrf_token %}
            <div class="form-group py-2">
                <div class="input-field">
                    {% if messages %}
                    {% for msg in messages %}
                    <p class="alert-danger p-3 font-weight-bold">{{msg}}</p>
                    {% endfor %}
                    {% endif %}
                    <label>User Name :</label>
                    <input name="username" type="text" placeholder="Username " required class="form-control">
                </div>
            </div>
            <div class="form-group py-1 pb-2">
                <div class="input-field">
                    <label>Password :</label>
                    <input name="password" type="password" placeholder="Enter your Password" required class="form-control">

                </div>
            </div>


           <center> <button type="submit" class="btn btn-primary  my-3">Log in</button></center>
            <div class="text-center pt-3 text-muted">Not a member? <a href="/finance/register">Sign up</a></div>
        </form>

</div>
    </div>
</div>
<script>

</script>



{% endblock %}
