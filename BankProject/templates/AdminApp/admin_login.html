{% extends 'AdminApp/layout.html' %}
{% block content %}
{% load static %}
<div style=" background-image: url({% static 'FinanceApp/images/loan_3.jpg' %});background-size: 100% 100%; background-position: center; height:600px;" >
<div class="container"  >
  <div class="row justify-content-center" style="justify-content:center;">
    <div class="col-md-6 shadow p-5" style="background-color:rgba(255, 255, 255, 0.6);margin-top:100px">
    <h3 class="text-center">FINANCE ADMIN LOGIN</h3>
      <form class="pt-3 " method="post">
          {% csrf_token %}
                    {% if messages %}
                    {% for msg in messages %}
                    <p class="alert-danger p-3 font-weight-bold">{{msg}}</p>
                    {% endfor %}
                    {% endif %}
            <div class="form-group py-2">
                <div class="input-field">
                    <label>Admin Name :</label>
                    <input name="username" type="text" placeholder="Admin Name " required class="form-control">
                </div>
            </div>
            <div class="form-group py-1 pb-2">
                <div class="input-field">
                    <label>Password :</label>
                    <input name="password" type="password" placeholder="Enter your Password" required class="form-control">

                </div>
            </div>


           <center> <button type="submit" class="btn btn-primary  my-3">Log in</button></center>

        </form>


</div>
  </div>
</div>
</div>
{% endblock %}
